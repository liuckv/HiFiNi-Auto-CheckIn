name: HiFINI-Auto-CheckIn

on:
  workflow_dispatch:   # 支持手动触发
  schedule:
    - cron: "30 22 * * *"   # 北京时间 06:30（UTC 22:30）

permissions:
  contents: read    # 允许 GitHub Actions 获取代码

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COOKIE: ${{ secrets.COOKIE }}   # 从 GitHub Secrets 中获取 COOKIE

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Compile and Run SignIn Java
        run: |
          javac src/main/java/cloud/ohiyou/HifiniApplication.java
          java cloud.ohiyou.HifiniApplication
