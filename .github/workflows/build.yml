name: HiFINI-Auto-CheckIn

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COOKIE: ${{ secrets.COOKIE }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup JDK 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Compile
        run: |
          mkdir -p out
          javac -d out src/main/java/cloud/ohiyou/HifiniApplication.java

      - name: Run
        run: |
          java -cp out cloud.ohiyou.HifiniApplication
