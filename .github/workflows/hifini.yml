name: HiFiNi CheckIn

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:

  checkin:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build
        run: mvn -B package --file pom.xml

      - name: Run
        env:
          HIFINI_COOKIE: ${{ secrets.HIFINI_COOKIE }}
        run: |
          java -jar target/*.jar
